<!DOCTYPE html>
<html lang="en" data-theme="black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Scan | Infrastructure Safety Audit System</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; }
        .map-container { border: 1px solid #262626; border-radius: 0.5rem; overflow: hidden; height: 100%; }
        #feed::-webkit-scrollbar { width: 4px; }
        #feed::-webkit-scrollbar-track { background: #000; }
        #feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .hazard-card { transition: all 0.2s ease; border-bottom: 1px solid #1a1a1a; }
        .hazard-card:hover { background-color: #0a0a0a; }
    </style>
</head>
<body class="bg-black h-screen flex flex-col overflow-hidden text-neutral-400">
    <div id="loading" class="loading-overlay fixed inset-0 bg-black bg-opacity-95 z-50 flex-col items-center justify-center">
        <span class="loading loading-spinner text-white w-12 h-12 mb-4"></span>
        <h2 class="text-xl font-medium text-white">Analyzing infrastructure...</h2>
    </div>

    <header class="bg-black border-b border-neutral-900 px-6 py-4 flex items-center justify-between shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-white rounded flex items-center justify-center text-black font-bold">S</div>
            <div>
                <h1 class="text-lg font-bold text-white leading-none">Safe-Scan</h1>
                <p class="text-[10px] text-neutral-600 mt-1 uppercase tracking-widest font-bold">University Infrastructure Auditor</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[10px] uppercase font-bold tracking-widest text-neutral-600">Compliance</span>
                <span id="safety-score-text" class="text-xl font-bold text-white leading-none">85%</span>
            </div>
            <div class="radial-progress text-white border-2 border-neutral-900" id="safety-gauge" style="--value:85; --size:2.5rem; --thickness: 2px;">85%</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="flex-1 p-6 flex flex-col gap-6">
            <div class="flex-1 relative rounded-lg bg-black border border-neutral-900">
                <div id="map" style="height:100%; border-radius:0.5rem;"></div>
            </div>
            
            <div class="bg-black rounded-lg p-6 border border-neutral-900 shrink-0">
                <form id="upload-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-neutral-600 uppercase mb-2">1. Select Evidence</label>
                        <input type="file" id="image-input" accept="image/*" class="file-input file-input-bordered file-input-sm w-full bg-black border-neutral-800 text-xs" required />
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-neutral-600 uppercase mb-2">2. Manual Notes (Optional)</label>
                        <input type="text" id="user-description" class="input input-bordered input-sm w-full bg-black border-neutral-800 text-xs text-white" placeholder="e.g. Near Block C entrance" />
                    </div>
                    <div class="flex items-end">
                        <button type="submit" id="submit-btn" class="btn btn-sm w-full bg-white hover:bg-neutral-200 text-black border-none font-bold uppercase">Generate Audit Report</button>
                    </div>
                </form>
                <div class="mt-3 flex items-center gap-2">
                    <div class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span id="location-status" class="text-[9px] uppercase tracking-wider font-bold text-neutral-700 font-mono">GPS System Standby</span>
                </div>
            </div>
        </div>

        <aside class="w-[450px] bg-black border-l border-neutral-900 flex flex-col shrink-0 z-10 relative">
            <div class="px-6 py-4 border-b border-neutral-900 flex justify-between items-center">
                <h2 class="text-xs font-bold text-white uppercase tracking-widest">Incident Feed</h2>
                <div class="badge badge-error badge-xs">LIVE</div>
            </div>
            <div id="feed" class="flex-1 overflow-y-auto flex flex-col bg-black">
                <!-- Cards appear here -->
            </div>
        </aside>
    </main>

    <script>
        const map = L.map('map', {zoomControl: false}).setView([28.6139, 77.2090], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'OSM' }).addTo(map);

        const customIcon = L.divIcon({ className: 'custom-div-icon', html: "<div class='pulse-marker' style='background:#f87171; width:12px; height:12px; border-radius:50%; box-shadow:0 0 10px #f87171;'></div>", iconSize: [12, 12], iconAnchor: [6, 6] });
        let currentScore = 85;

        function updateGauge(severity) {
            currentScore = Math.max(0, currentScore - (severity * 1.5));
            const rounded = Math.round(currentScore);
            const gauge = document.getElementById('safety-gauge');
            const txt = document.getElementById('safety-score-text');
            gauge.style.setProperty('--value', rounded);
            gauge.innerText = rounded + '%';
            txt.innerText = rounded + '%';
        }

        function addReportToFeed(data) {
            const feed = document.getElementById('feed');
            const timestamp = data.timestamp || new Date().toLocaleTimeString();
            const imageUrl = data.image_url || 'https://placehold.co/400x200/111/444?text=Hazard+Evidence';
            
            // Build absolute location string with icons
            const coordsHtml = data.latitude ? `<div class="text-[10px] font-mono text-neutral-600 mb-2 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                ${data.latitude.toFixed(5)}, ${data.longitude.toFixed(5)}
            </div>` : '';

            // Forwarding data
            const shareText = encodeURIComponent(`*Safe-Scan Hazard Alert*\nType: ${data.hazard_type}\nSeverity: ${data.severity_score}/10\nViolation: ${data.legal_citation}`);
            const waUrl = `https://wa.me/?text=${shareText}`;
            const mailUrl = `mailto:maintenance@university.edu?subject=HAZARD:${data.hazard_type}&body=${encodeURIComponent(data.professional_email_draft || 'Report')}`;

            const card = document.createElement('div');
            card.className = 'hazard-card p-6';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="font-bold text-white text-base leading-tight uppercase tracking-tight">${data.hazard_type}</h3>
                        ${coordsHtml}
                    </div>
                    <div class="px-2 py-1 rounded bg-neutral-900 border border-neutral-800 text-[10px] font-black tracking-tighter text-white">
                        ${data.severity_score}/10 SEV
                    </div>
                </div>

                <div class="mb-4 rounded-md overflow-hidden bg-neutral-950 border border-neutral-900 aspect-video">
                    <img src="${imageUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x200/111/444?text=Audit+Photo+N/A'">
                </div>

                ${data.user_description ? `<div class="mb-4 p-2 bg-neutral-950 border-l border-neutral-800 text-xs italic text-neutral-500">"${data.user_description}"</div>` : ''}

                <p class="text-xs text-neutral-400 mb-4 leading-relaxed">${data.description}</p>

                <div class="space-y-3 mb-6">
                    <div>
                        <span class="block text-[8px] font-bold text-neutral-600 uppercase tracking-widest mb-1">Standard Violation</span>
                        <div class="text-[10px] font-bold text-white">${data.legal_citation}</div>
                    </div>
                    <div>
                        <span class="block text-[8px] font-bold text-neutral-600 uppercase tracking-widest mb-1">Priority Action</span>
                        <div class="text-[10px] text-neutral-300 font-medium">${data.priority_action}</div>
                    </div>
                </div>

                <div class="flex gap-2 mb-4">
                    <a href="${waUrl}" target="_blank" class="flex-1 btn btn-xs h-8 bg-green-600 hover:bg-green-700 text-white border-none rounded uppercase font-bold text-[9px]">WhatsApp Forward</a>
                    <a href="${mailUrl}" class="flex-1 btn btn-xs h-8 bg-white hover:bg-neutral-200 text-black border-none rounded uppercase font-bold text-[9px]">Send Email</a>
                </div>

                <details class="group">
                    <summary class="list-none text-[9px] font-bold text-neutral-700 cursor-pointer hover:text-neutral-500 uppercase tracking-widest flex items-center gap-1">
                        View Official Email Draft <svg class="w-2 h-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                    </summary>
                    <div class="mt-2 p-3 bg-neutral-950 border border-neutral-900 rounded text-[9px] font-mono whitespace-pre-wrap text-neutral-500 leading-normal">
${data.professional_email_draft}
                    </div>
                </details>
            `;
            feed.prepend(card);
        }

        const mockData = [
            { hazard_type: "Structural Crack", severity_score: 7, legal_citation: "NBC 2016 PART 6", description: "Deep fissure in pillar Block B auditorium.", priority_action: "Structural audit required.", professional_email_draft: "Ref: Block B Crack audit...", latitude: 28.6145, longitude: 77.2095 },
            { hazard_type: "Fire Safety Breach", severity_score: 9, legal_citation: "NBC 2016 PART 4", description: "All fire extinguishers in library are expired.", priority_action: "Immediate refill mandatory.", professional_email_draft: "Ref: Library Fire Audit...", latitude: 28.6135, longitude: 77.2085 }
        ];

        window.onload = () => {
            mockData.forEach(d => {
                addReportToFeed(d);
                L.marker([d.latitude, d.longitude], {icon: customIcon}).addTo(map);
                updateGauge(d.severity_score/2);
            });
        };

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('image-input');
            const submitBtn = document.getElementById('submit-btn');
            const locStatus = document.getElementById('location-status');
            
            if (fileInput.files.length === 0) return;

            submitBtn.disabled = true;
            submitBtn.innerText = "GPS TRACKING...";
            locStatus.innerText = "COORDINATING WITH SATELLITE...";
            
            let coords = null;
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000}));
                coords = pos.coords;
                locStatus.innerText = "LOCATION SECURED: " + coords.latitude.toFixed(4) + ", " + coords.longitude.toFixed(4);
                locStatus.className = "text-[9px] uppercase tracking-wider font-bold text-green-700 font-mono";
            } catch(e) {
                locStatus.innerText = "GPS OFFLINE - USING ESTIMATED POSITION";
                locStatus.className = "text-[9px] uppercase tracking-wider font-bold text-amber-700 font-mono";
            }

            document.getElementById('loading').classList.add('loading-active');
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('user_description', document.getElementById('user-description').value);
            if(coords) { formData.append('latitude', coords.latitude); formData.append('longitude', coords.longitude); }

            try {
                const res = await fetch('/audit', { method: 'POST', body: formData });
                const text = await res.text(); // Get raw text first to handle non-JSON errors
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    throw new Error("Server returned non-JSON response: " + text.substring(0, 100));
                }

                if (!res.ok) {
                    alert("AUDIT FAILED:\n" + (data.error || "Unknown error"));
                    return;
                }
                addReportToFeed(data);
                const markerLat = data.latitude || (map.getCenter().lat + (Math.random()-0.5)*0.01);
                const markerLng = data.longitude || (map.getCenter().lng + (Math.random()-0.5)*0.01);
                L.marker([markerLat, markerLng], {icon: customIcon}).addTo(map);
                updateGauge(data.severity_score);
                map.flyTo([markerLat, markerLng], 18);
                fileInput.value = ''; document.getElementById('user-description').value = '';
            } catch(e) { 
                console.error(e);
                alert("AUDIT FAILED.\n" + e.message); 
            }
            finally { document.getElementById('loading').classList.remove('loading-active'); submitBtn.disabled = false; submitBtn.innerText = "GENERATE AUDIT REPORT"; }
        });
    </script>
</body>
</html>
